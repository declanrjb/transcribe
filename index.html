<!DOCTYPE html>
<head>
    <title>Mimir</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="web-app/styles.css">

    <link rel="shortcut icon" type="image/x-icon" href="web-app/icon.svg">
    <script src="https://kit.fontawesome.com/bb1d08a9b2.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="web-app/script.js"></script>
</head>
<body>
    <audio src="" id="audio-host"></audio>
    <div class="central-panel">
        <column style="width: 70%;" id="left-col">
            <div class="controls">
                <div class="control-buttons">
                    <button id="play" class="audio-button"><i class="fa-solid fa-play"></i></button>
                    <button id="pause" class="audio-button"><i class="fa-solid fa-pause"></i></button>
                    <button id="restart" class="audio-button"><i class="fa-solid fa-arrows-rotate"></i></button>
                    <button id="download-records" class="file-button"><i class="fa-solid fa-floppy-disk"></i></button>
                    <button id="upload-records" class="file-button"><i class="fa-solid fa-cloud-arrow-up"></i></button>
                    <input type='file' id="session-records-input" hidden/>
                    <button id="upload-audio" class="file-button"><i class="fa-solid fa-file-audio"></i></button>
                    <input type='file' id="audio-input" hidden/>
                    <button id="time-readout" enabled="false"><a id="currentTime">0:00</a><a id="length"></a></button>
                </div>
            </div>
            <div class="transcript"></div>
        </column>
        <column style="width: 30%;" id="right-col">
            <div class="suggested-quotes" id="quotes">
                <p class="quote-header quotes-on" style="display: block;"><i class="fa-solid fa-square-caret-right"></i> <b>View Suggested Quotes</b></p>
                <p class="quote-header quotes-off" style="display: none;"><i class="fa-solid fa-square-caret-down"></i> <b>Hide Suggested Quotes</b></p>
                <div class="quote-list" style="display: none;">
                    <hr>
                </div>
            </div>
            <div class="comments"></div>
        </column>
        
    </div>
    <div class="intro-panel">
        <h2 class="intro-header">Welcome to Mimir. How can I help you today?</h2>
        <img class="laurel" id="laurel-left" src="traced-half-horn.png">
        <div class="intro-buttons">
            <div class="intro-button" id="intro-upload-button">Upload Audio <i class="fa-solid fa-circle-up" id="upload-arrow"></i></div>
            <div class="intro-button" id="intro-resume-button">Resume Session <i class="fa-solid fa-circle-right" id="resume-arrow"></i></div>
        </div>
        <img class="laurel" id="laurel-right" src="traced-half-horn.png">
    </div>
    
</body>
