<!DOCTYPE html>
<head>
    <title>Transcribe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .central-panel {
    max-width: 1200px;
    margin: auto;
    margin-top: 20px;
}

.transcript {
    font-family: 'Times New Roman', Times, serif;
    font-size: 1.2em;
    line-height: 1.5em;
    margin-top: 100px;
}


/*
.segment:hover {
    background-color: yellow;
}
*/

.segment-highlighted {
    text-decoration: underline;
    text-decoration-color: #6184d8;
    text-decoration-thickness: 3px;
}

column {
    float: left;
    display: block;
    padding: 10px;
    box-sizing: border-box;
}


.comment {
    border-left: 2px solid black;
    border-top: 2px solid black;
    width: 25%;
    padding-left: 10px;
    padding-right: 10px;
    padding-top: 5px;
    padding-bottom: 5px;
    box-sizing: border-box;
    position: absolute;
    font-family: 'Times New Roman', Times, serif;
    font-size: 1.2em;
    line-height: 1.5em;
}

.controls {
    box-shadow: 0 1px 5px #a6a6a6;
    padding: 15px;
    box-sizing: border-box;
    position: fixed;
    background-color: white;
    width: fit-content;
    margin-left: -10px;
    font-size: 1.7em;
    border-radius: 20px;
}

.controls button {
    font-size: 1rem;
    padding: 10px;
    margin: 0px;
    min-width: 40px;
    height: 40px;
}

#currentTime {
    padding-left: 5px;
}

.control-buttons {
    margin-top: 0px;
    margin-bottom: 0px;
}

#pause {
    display: none;
}

button {
    background-color: #6184d8;
    color: white;
    border: none;
    border-radius: 10px;
}

button:hover {
    background-color: #1f487e;
}

#time-readout {
    background-color: transparent;
    color: black;
    margin-left: 0px;
    padding-left: 0px;
}

.speaker-label {
    font-size: 1em;
    border: none;
    border-color: transparent;
    outline: none;
    font-weight: bold;
    font-family: 'Times New Roman', Times, serif;
}

.highlight {
    background-color: yellow;
}
    </style>
    <link rel="shortcut icon" type="image/x-icon" href="">
    <script src="https://kit.fontawesome.com/bb1d08a9b2.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
    <script type="module" src="transcribe.js"></script>
</head>
<body>
    <audio src="kate-micro.mp3" id="audio-host" type="audio/mp3"></audio>
    <div class="central-panel">
        <column style="width: 70%;" id="left-col">
            <div class="controls">
                <div class="control-buttons">
                    <button id="play"><i class="fa-solid fa-play"></i></button>
                    <button id="pause"><i class="fa-solid fa-pause"></i></button>
                    <button id="restart"><i class="fa-solid fa-arrows-rotate"></i></button>
                    <button id="download-records">Download Records <i class="fa-solid fa-download"></i></button>
                    <button id="upload-records">Resume Session <i class="fa-solid fa-upload"></i></button>
                    <input type='file' id="session-records-input" hidden/>
                    <button id="upload-audio">Upload Audio <i class="fa-solid fa-upload"></i></button>
                    <input type='file' id="audio-input" hidden/>
                    <button id="time-readout" enabled="false"><a id="currentTime">0</a><a id="length"></a></button>
                </div>
            </div>
            <div class="transcript"></div>
        </column>
        <column style="width: 30%;" id="right-col">
            <div class="comments"></div>
        </column>
        
    </div>
    
</body>
