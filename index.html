<!DOCTYPE html>
<head>
    <title>Transcribe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="web-app/styles.css">

    <link rel="shortcut icon" type="image/x-icon" href="">
    <script src="https://kit.fontawesome.com/bb1d08a9b2.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="web-app/script.js"></script>
</head>
<body>
    <audio src="kate-micro.mp3" id="audio-host"></audio>
    <div class="central-panel">
        <column style="width: 70%;" id="left-col">
            <div class="controls">
                <div class="control-buttons">
                    <button id="play"><i class="fa-solid fa-play"></i></button>
                    <button id="pause"><i class="fa-solid fa-pause"></i></button>
                    <button id="restart"><i class="fa-solid fa-arrows-rotate"></i></button>
                    <button id="time-readout" enabled="false"><a id="currentTime">0</a><a id="length"></a></button>
                </div>
            </div>
            
            <div class="transcript"></div>
        </column>
        <column style="width: 30%;" id="right-col">
            <div class="control-buttons" id="upload-buttons">
                <button id="download-records"><i class="fa-solid fa-floppy-disk"></i></button>
                <button id="upload-records"><i class="fa-solid fa-cloud-arrow-up"></i></button>
                <input type='file' id="session-records-input" hidden/>
                <button id="upload-audio"><i class="fa-solid fa-file-audio"></i></button>
                <input type='file' id="audio-input" hidden/>
            </div>
            <div class="comments"></div>
        </column>
        
    </div>
    
</body>
