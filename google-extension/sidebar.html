<script src="//ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
<script>
  /**
   * On document load, assign click handlers to each button and try to load the
   * user's origin and destination language preferences if previously set.
   */
  $(function() {
    //$('#run-translation').click(runTranslation);
    //$('#insert-text').click(insertText);
    google.script.run.withSuccessHandler(loadPreferences)
            .withFailureHandler(showError).getPreferences();

    var audioElement = document.getElementById('audio-host')
    
    audioElement.addEventListener('ended', function() {
        this.pause();
        audioElement.currentTime = 0;
        $('#play').css('display', 'inline')
        $('#pause').css('display', 'none')
    }, false);

    $('#play').click(function() {
        audioElement.play();
        $("#status").text("Status: Playing");
        $('#pause').css('display', 'inline');
        $(this).css('display', 'none');
    });
    
    $('#pause').click(function() {
        audioElement.pause();
        $("#status").text("Status: Paused");
        $('#play').css('display', 'inline');
        $(this).css('display', 'none');
    });
    
    $('#restart').click(function() {
        audioElement.currentTime = 0;
    });

    $('#upload-audio').on('click', function() {
        $('#audio-input').click()
    })

    	$('#audio-input').on('change', async function(e) {
        $('#upload-audio>.fa-solid').attr('class', 'fa-solid fa-spinner')
        var file = e.target.files[0]
        //console.log('hello world')
        //console.log(file)
        //docInsertText('hello world this is an input')

        $('#audio-host').attr('src', URL.createObjectURL(file))
        var data = new FormData()
        data.append('file', file)
        data.append('user', 'hubot')
        

        console.log('sending')
        let response = await fetch('https://transcribe-qn6o.onrender.com/transcribe', {
            method: 'POST',
            body: data
        })

        const r = await response.json();
        $('#upload-audio>.fa-solid').attr('class', 'fa-solid fa-file-audio')

        var data = r['transcript']['segments']

        var outputText = ""
        
        var currentSpeaker = data[0]['speaker_id']
        var prevSpeaker = null;
        for (var i=0; i<data.length; i++) {
            var segment = data[i];
            currentSpeaker = segment['speaker_id'];
            if (currentSpeaker != prevSpeaker) {
                outputText += (currentSpeaker + '\n\n')
            }

            outputText += (segment['text'] + '\n\n')

            prevSpeaker = currentSpeaker;
        }

        // var audioElement = document.getElementById('audio-host')
        // audioElement.play()
        ('#play').click()

        google.script.run
          .withSuccessHandler(
                  function(returnSuccess, element) {
                    element.disabled = false;
                  })
          .withFailureHandler(
                  function(msg, element) {
                    showError(msg, $('#button-bar'));
                    element.disabled = false;
                  })
          .withUserObject(this)
          .insertText(outputText);
    })
  });

  /**
   * Callback function that populates the origin and destination selection
   * boxes with user preferences from the server.
   *
   * @param {Object} languagePrefs The saved origin and destination languages.
   */
  function loadPreferences(languagePrefs) {
    $('input:radio[name="origin"]')
            .filter('[value=' + languagePrefs.originLang + ']')
            .attr('checked', true);
    $('input:radio[name="dest"]')
            .filter('[value=' + languagePrefs.destLang + ']')
            .attr('checked', true);
  }

  /**
   * Runs a server-side function to insert the translated text into the document
   * at the user's cursor or selection.
   */
  function insertText() {
    this.disabled = true;
    $('#error').remove();
    google.script.run
            .withSuccessHandler(
                    function(returnSuccess, element) {
                      element.disabled = false;
                    })
            .withFailureHandler(
                    function(msg, element) {
                      showError(msg, $('#button-bar'));
                      element.disabled = false;
                    })
            .withUserObject(this)
            .insertText('\n blorble blorble');
  }

  /**
   * Inserts a div that contains an error message after a given element.
   *
   * @param {string} msg The error message to display.
   * @param {DOMElement} element The element after which to display the error.
   */
  function showError(msg, element) {
    const div = $('<div id="error" class="error">' + msg + '</div>');
    $(element).after(div);
  }
</script>

<!-- Custom JavaScript -->
<script>
// Constants.
var REFRESH_WAIT_SECONDS = 1;
var INACTIVITY_TIMEOUT_MINUTES = 2;

// Global variables.
var lastResult;
var refreshOn = true;
var lastChangedTime;
var timeoutId;

// On page load.
$(function() {
  $('#loading').hide();
  refreshState();
});

/**
 * Refreshes the state information in the sidebar.
 */
function refreshState() {
  google.script.run.withFailureHandler(function(error) {
    showError(error);
    tick(null);
  }).withSuccessHandler(function(result) {
    hideError();
    if (!lastResult || !jsonEquals(result.cursor, lastResult.cursor)) {
      updateCursor(result.cursor);
    }
    if (!lastResult || !jsonEquals(result.selection, lastResult.selection)) {
      jumpAudio(result.selection);
    }
    tick(result);
  }).getDocumentInfo();
}

/**
 * Updates the cursor information in the sidebar.
 * @param {Object} cursor The cursor information.
 */
function updateCursor(cursor) {
  if (cursor) {
    $('#cursor input').removeAttr('disabled');
    updateElement('element-type', cursor.element.type);
    updateElement('offset', cursor.offset);
    updateElement('surrounding-text', cursor.surroundingText);
    updateElement('surrounding-text-offset', cursor.surroundingTextOffset);
  } else {
    $('#cursor input').val('').attr('disabled', 'true');
  }
}

/**
 * Updates the selection information in the sidebar.
 * @param {Object} selection The selection information.
 */
function updateSelection(selection) {
  var tableBody = $('#selection table tbody');
  tableBody.children().remove();

  if (selection) {
      selection.selectedElements.forEach(function(selectedElement) {
        var row  = $('<tr>');
        var data = [
          selectedElement.element.type,
          '0',
          selectedElement.startOffset,
          selectedElement.endOffsetInclusive
        ];
        data.forEach(function(value) {
          row.append($('<td>').text(value));
        });
        tableBody.append(row);
      });
    tableBody.effect("highlight", { duration: 1500 });
  } else {
    tableBody.append($('<tr><td class="na" colspan="4">None</td></tr>'));
  }
  
}

function jumpAudio(selection) {
  google.script.run.withFailureHandler(function(error) {
    showError(error);
    tick(null);
  }).withSuccessHandler(function(result) {
    var audioElement = document.getElementById('audio-host')
    selection.selectedElements.forEach(function(selectedElement) {
        var progress = selectedElement.startOffset / result
        audioElement.currentTime = audioElement.duration * progress
        $('#audio-progress').text(progress)
      });
  }).totalCharacters();
}

/**
 * Shows an error message in the sidebar.
 * @param {string} error The error returned by the server.
 */
function showError(error) {
  $('#error').text(error).show();
  $('#results').css('color', 'gray');
}

/**
 * Hides any error message in the sidebar.
 */
function hideError() {
  $('#error').hide();
  $('#results').css('color', 'inherit');
}

/**
 * Updates the state of the document and sets up the next refresh.
 * @param {Object} result The last result, if any.
 */
function tick(result) {
  if (result) {
    if (!jsonEquals(result, lastResult)) {
      lastChangedTime = new Date();
    }
    lastResult = result;
  }
  $('#lastupdated').text(new Date().toLocaleTimeString());
  if (isInactive()) {
    toggleRefresh();
    lastResult = null;
    lastChangedTime = null;
  }
  if (refreshOn) {
    timeoutId = window.setTimeout(refreshState, REFRESH_WAIT_SECONDS * 1000);
  }
}

/**
 * Determines if the document is inactive.
 * @return {Boolean} True if the document is inactive, false otherwise.
 */
function isInactive() {
  var now = new Date();
  return lastChangedTime && now.getTime() - lastChangedTime.getTime() > INACTIVITY_TIMEOUT_MINUTES * 60 * 1000;
}

/**
 * Toggles whether or not automatic refreshing is on, and updated the button.
 */
function toggleRefresh() {
  var toggle = $('#toggle');
  if (refreshOn) {
    refreshOn = false;
    window.clearTimeout(timeoutId);
    toggle.text(toggle.data('resumetext'));
  } else {
    refreshOn = true;
    refreshState();
    toggle.text(toggle.data('stoptext'));
  }
}

/**
 * Updates an element with a new value and highlights it if there is a change.
 * @param {string} elementId The ID of the element to update.
 * @param {string} value The new value of the element.
 */
function updateElement(elementId, value) {
  var element = $(document.getElementById(elementId));
  if (String(element.val()) != String(value)) {
    element.val(value).effect("highlight", { duration: 1500 });
  }
}

/**
 * Determines if two Objects have the JSON structure.
 * @param {Object} a The first object.
 * @param {Object} b The second object.
 * @return {Boolean} True if both objects have the same JSON structure, false otherwise.
 */
function jsonEquals(a, b) {
  return JSON.stringify(a) == JSON.stringify(b);
}
</script>
