<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://ssl.gstatic.com/docs/script/css/add-ons1.css">

  <style>

    }
    .col-contain {
      overflow: hidden;
    }
    .col-one {
      float: left;

    }
    .logo {

      height: 20px;
    }

        transform:rotate(0deg);

}

.fa-spinner {
    animation-name: spin;

#upload-audio {
    background: #6184d8;

    width: 100%;

    border-radius: 15px;

  background: #10043a;
}
  </style>
  <title></title>
      <script src="https://kit.fontawesome.com/bb1d08a9b2.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
<div class="sidebar branding-below">
  <form>
    <div class="block" id="button-bar">
      <button id="upload-audio" class="file-button">Upload <i class="fa-solid fa-file-audio"></i></button>
      <input type='file' id="audio-input" hidden/>
    </div>
  </form>
</div>

<div class="sidebar bottom">
  <i class="fa-solid fa-ear-listen"></i>
  <span class="gray branding-text">Mimir Transcription by Declan Bradley</span>
</div>

<script src="//ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
<script>
  /**
   * On document load, assign click handlers to each button and try to load the
   * user's origin and destination language preferences if previously set.
   */
  $(function() {
    //$('#run-translation').click(runTranslation);
    //$('#insert-text').click(insertText);
    google.script.run.withSuccessHandler(loadPreferences)
            .withFailureHandler(showError).getPreferences();

    $('#upload-audio').on('click', function() {
        $('#audio-input').click()
    })

    	$('#audio-input').on('change', async function(e) {
        $('#upload-audio>.fa-solid').attr('class', 'fa-solid fa-spinner')
        var file = e.target.files[0]
        //console.log('hello world')
        //console.log(file)
        //docInsertText('hello world this is an input')

        // $('#audio-host').attr('src', URL.createObjectURL(file))
        var data = new FormData()
        data.append('file', file)
        data.append('user', 'hubot')
        

        console.log('sending')
        let response = await fetch('https://transcribe-qn6o.onrender.com/transcribe', {
            method: 'POST',
            body: data
        })

        const r = await response.json();
        $('#upload-audio>.fa-solid').attr('class', 'fa-solid fa-file-audio')

        var data = r['transcript']['segments']

        var outputText = ""
        
        var currentSpeaker = data[0]['speaker_id']
        var prevSpeaker = null;
        for (var i=0; i<data.length; i++) {
            var segment = data[i];
            currentSpeaker = segment['speaker_id'];
            if (currentSpeaker != prevSpeaker) {
                outputText += (currentSpeaker + '\n\n')
            }

            outputText += (segment['text'] + '\n\n')

            prevSpeaker = currentSpeaker;
        }

        google.script.run
          .withSuccessHandler(
                  function(returnSuccess, element) {
                    element.disabled = false;
                  })
          .withFailureHandler(
                  function(msg, element) {
                    showError(msg, $('#button-bar'));
                    element.disabled = false;
                  })
          .withUserObject(this)
          .insertText(outputText);
    })
  });

  /**
   * Callback function that populates the origin and destination selection
   * boxes with user preferences from the server.
   *
   * @param {Object} languagePrefs The saved origin and destination languages.
   */
  function loadPreferences(languagePrefs) {
    $('input:radio[name="origin"]')
            .filter('[value=' + languagePrefs.originLang + ']')
            .attr('checked', true);
    $('input:radio[name="dest"]')
            .filter('[value=' + languagePrefs.destLang + ']')
            .attr('checked', true);
  }

  /**
   * Runs a server-side function to translate the user-selected text and update
   * the sidebar UI with the resulting translation.
   */
  function runTranslation() {
    this.disabled = true;
    $('#error').remove();
    const origin = $('input[name=origin]:checked').val();
    const dest = $('input[name=dest]:checked').val();
    const savePrefs = $('#save-prefs').is(':checked');
    google.script.run
            .withSuccessHandler(
                    function(textAndTranslation, element) {
                      $('#translated-text').val(textAndTranslation.translation);
                      element.disabled = false;
                    })
            .withFailureHandler(
                    function(msg, element) {
                      showError(msg, $('#button-bar'));
                      element.disabled = false;
                    })
            .withUserObject(this)
            .getTextAndTranslation(origin, dest, savePrefs);
  }

  /**
   * Runs a server-side function to insert the translated text into the document
   * at the user's cursor or selection.
   */
  function insertText() {
    this.disabled = true;
    $('#error').remove();
    google.script.run
            .withSuccessHandler(
                    function(returnSuccess, element) {
                      element.disabled = false;
                    })
            .withFailureHandler(
                    function(msg, element) {
                      showError(msg, $('#button-bar'));
                      element.disabled = false;
                    })
            .withUserObject(this)
            .insertText('\n blorble blorble');
  }

  function docInsertText(text) {
    google.script.run
            .withSuccessHandler(
                    function(returnSuccess, element) {
                      element.disabled = false;
                    })
            .withFailureHandler(
                    function(msg, element) {
                      showError(msg, $('#button-bar'));
                      element.disabled = false;
                    })
            .withUserObject(this)
            .insertText('hello world');
  }

  /**
   * Inserts a div that contains an error message after a given element.
   *
   * @param {string} msg The error message to display.
   * @param {DOMElement} element The element after which to display the error.
   */
  function showError(msg, element) {
    const div = $('<div id="error" class="error">' + msg + '</div>');
    $(element).after(div);
  }
</script>
</body>
</html>
